<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow">
  <title>العروض والكوبونات | Readhubs</title>
  <meta name="description" content="أحدث كوبونات الخصم على كورسات Readhubs على Udemy">
  <link rel="canonical" href="https://readhubs.github.io/ar/deals/index.html">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <header class="site-header">
    <a href="../index.html" class="logo">Readhubs</a>
  </header>
  <main class="deals-page">
    <h1>⚡ العروض والكوبونات النشطة</h1>
    <div id="deals-container"></div>
    <div id="no-deals" class="no-deals" style="display:none;">
      لا توجد عروض نشطة في الوقت الحالي. ارجع قريباً!
    </div>
  </main>
  <footer class="site-footer">
    <span>&copy; 2026 Readhubs</span>
  </footer>
  <script src="../courses-data.js"></script>
  <script>
    (function() {
      if (typeof coursesData === "undefined") { document.getElementById("no-deals").style.display="block"; return; }
      var today = new Date().toISOString().slice(0, 10);
      var active = (coursesData.courses || []).filter(function(c) {
        return c.coupon_code && c.coupon_expires && c.coupon_expires >= today;
      });
      var el = document.getElementById("deals-container");
      var noEl = document.getElementById("no-deals");
      if (active.length === 0) { noEl.style.display="block"; return; }
      active.forEach(function(c) {
        var expDate = new Date(c.coupon_expires);
        var now = new Date();
        var diff = expDate - now;
        var days = Math.floor(diff / 86400000);
        var hours = Math.floor((diff % 86400000) / 3600000);
        var countdown = diff > 0 ? ("ينتهي بعد: " + days + " يوم و" + hours + " ساعة") : "انتهى العرض";
        el.innerHTML += '<div class="deal-card"><div class="deal-info"><h3>' + c.title_ar + '</h3><div class="coupon-code">' + c.coupon_code + '</div><div class="countdown">' + countdown + '</div></div><a href="../courses/' + c.id + '/index.html" class="cta-button">اشترِ الآن</a></div>';
      });
    })();
  </script>
</body>
</html>
