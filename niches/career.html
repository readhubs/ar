<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow">
  <meta name="google-site-verification" content="pgigX05_bS7NIfxgAqbgPF1yhXFxfBwGxSSkj62HsC4" />
  <title>المسيرة المهنية | Readhubs</title>
  <meta name="description" content="كورسات في التطوير المهني والقيادة">
  <link rel="canonical" href="https://readhubs.github.io/ar/niches/career.html">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <header class="site-header">
    <a href="../index.html" class="logo">Readhubs</a>
    <nav class="site-nav">
      <a href="money.html">المال</a>
      <a href="communication.html">التواصل</a>
      <a href="mental-health.html">الصحة النفسية</a>
      <a href="productivity.html">الإنتاجية</a>
      <a href="career.html">المسيرة المهنية</a>
    </nav>
  </header>
  <main class="niche-page">
    <div class="niche-hero">
      <h1>المسيرة المهنية</h1>
      <p>كورسات في التطوير المهني والقيادة</p>
    </div>
    <div id="courses-container" class="courses-grid"></div>
    <div id="no-courses-msg" class="no-deals" style="display:none;">لا توجد كورسات في هذه الفئة بعد.</div>
  </main>
  <footer class="site-footer">
    <span>&copy; 2026 Readhubs</span>
    <a href="../about/index.html">من نحن</a>
  </footer>
  <script src="../courses-data.js"></script>
  <script>
    (function() {
      if (typeof coursesData === "undefined") return;
      var niche = "career";
      var courses = (coursesData.courses || []).filter(function(c) {
        return c.niche === niche && c.status === "published";
      });
      var el = document.getElementById("courses-container");
      var noEl = document.getElementById("no-courses-msg");
      if (courses.length === 0) { el.style.display="none"; if(noEl) noEl.style.display="block"; return; }
      courses.forEach(function(c) {
        el.innerHTML += '<a href="../courses/' + c.id + '/index.html" class="course-card" style="display:block;"><img src="../' + (c.thumbnail||"") + '" alt="' + c.title_ar + '" onerror="this.style.display='none'"><div class="course-card-body"><h3>' + c.title_ar + '</h3></div></a>';
      });
    })();
  </script>
</body>
</html>
