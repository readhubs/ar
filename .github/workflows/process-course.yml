name: Generate Course Content

on:
  push:
    paths:
      - '_courses/*.txt'
  workflow_dispatch:
    inputs:
      course_file:
        description: 'Filename in _courses/ (e.g. my-course.txt). Leave blank to process all.'
        required: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate course content
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.course_file }}" ]; then
            TARGET="_courses/${{ github.event.inputs.course_file }}"
            if [ -f "$TARGET" ]; then
              echo "=== Processing: $TARGET ==="
              node _scripts/generate-course.js "$TARGET"
            else
              echo "File not found: $TARGET"
              exit 1
            fi
          else
            FOUND=0
            for FILE in _courses/*.txt; do
              [ -f "$FILE" ] || continue
              echo "=== Processing: $FILE ==="
              node _scripts/generate-course.js "$FILE"
              FOUND=$((FOUND + 1))
            done
            if [ "$FOUND" -eq 0 ]; then
              echo "No .txt files found in _courses/"
              exit 0
            fi
            echo "Processed $FOUND file(s)."
          fi

      - name: Commit generated files to repo
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add courses/ courses-data.js sitemap.xml .nojekyll || true
          if git diff --staged --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "bot: auto-generate course content [skip ci]"
            git push
          fi
